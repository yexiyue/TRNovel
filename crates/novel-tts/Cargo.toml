[package]
name = "novel-tts"
version = "0.1.6"
edition = "2024"
description = "Terminal reader for novel"
authors = ["yexiyue <yexiyue666@qq.com>"]
license = "MIT"
keywords = ["Novel", "TTS"]
repository = "https://github.com/yexiyue/parse-book-source"

[dependencies]
anyhow.workspace = true
dirs.workspace = true
futures.workspace = true
kokoro-tts = "0.3.3"
regex.workspace = true
# kokoro-tts = { path = "/Users/yexiyue/rust-project/kokoro" }
# 注:reqwest 0.13 的 `rustls` 特性默认改用 aws-lc-rs(引入 C 构建依赖 cmake/nasm),
# 与本项目用 ring/rustls 发纯净静态二进制的取向相悖,故暂留 0.12.x(ring)。
reqwest = { version = "0.12", default-features = false, features = [
    "json",
    "rustls-tls",
    "cookies",
] }
rodio = { version = "0.21.1", default-features = false, features = [
    "playback",
    "wav",
    "tracing"
] }
thiserror.workspace = true
tokio.workspace = true
tokio-util.workspace = true
